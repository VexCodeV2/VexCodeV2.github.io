<!DOCTYPE html>
<html>
<head>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background-color: #0f172a; /* Deep dark background to make the blue pop */
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }

  .cool-text {
    font-size: 5rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: -2px;
    
    /* Creating a cool blue gradient */
    background: linear-gradient(to right, #38bdf8, #1d4ed8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    
    /* Subtle glow effect */
    filter: drop-shadow(0 0 10px rgba(56, 189, 248, 0.3));
  }
</style>
</head>
<body>

  <h1 class="cool-text">maintenance mode "we will be back!"</h1>

</body>
</html>
