<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VexCode | Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #22d3ee;
            --bg: #050814;
            --panel: #0b1220;
            --border: #1e90ff;
            --err: #ff4d4d;
            --success: #00ff88;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #0a0f1f 0%, #050814 100%);
            font-family: 'Orbitron', sans-serif;
            color: white;
            overflow: hidden;
        }

        .wrapper {
            position: relative;
            padding: 2px;
            border-radius: 24px;
            background: linear-gradient(135deg, var(--border), var(--neon), var(--border));
            box-shadow: 0 0 35px rgba(0, 150, 255, 0.3);
        }

        .terminal {
            width: 320px;
            padding: 40px;
            background: var(--panel);
            border-radius: 22px;
            text-align: center;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.9);
        }

        #success_msg {
            display: none;
            color: var(--success);
            font-size: 12px;
            margin-bottom: 15px;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(0, 255, 136, 0.5);
        }

        h2 {
            font-size: 1rem;
            letter-spacing: 2px;
            color: var(--neon);
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        #err_msg { color: var(--err); font-size: 10px; margin-bottom: 10px; height: 12px; }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background: #050a16;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--neon);
            text-align: center;
            font-family: monospace;
            outline: none;
            box-sizing: border-box;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, var(--border), var(--neon));
            color: #001428;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .btn:hover {
            box-shadow: 0 0 20px var(--neon);
            transform: scale(1.02);
        }

        #status_bar {
            display: none;
            margin-top: 20px;
            font-size: 9px;
            color: var(--neon);
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="terminal">
        <div id="success_msg">THE PASSWORD IS 1234</div>
        
        <h2>Secure Access</h2>
        <div id="err_msg"></div>
        
        <input type="password" id="pass_key" placeholder="ENTER ACCESS KEY">

        <button class="btn" onclick="authenticate()">Authenticate</button>

        <div id="status_bar">SYSTEM_UNLOCKED // AUDIO_SYNC_PLAYING</div>
    </div>
</div>
