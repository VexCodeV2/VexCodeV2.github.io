<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VexCode | C2 Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6366f1; --s: #a855f7; --a: #22d3ee; --bg: #020202; --err: #ff4d4d; }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        
        body { 
            background-color: var(--bg); 
            color: white; 
            font-family: 'Fira Code', monospace; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
        }

        #v_ { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.25; }

        .box_ { 
            position: relative;
            width: 440px; 
            padding: 60px 40px; 
            border-radius: 5px; 
            background: rgba(5, 5, 5, 0.9); 
            border-left: 4px solid var(--p);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px); 
            text-align: center; 
            z-index: 10; 
            box-shadow: 0 0 40px rgba(0,0,0,1);
        }

        h2 { 
            font-family: 'Orbitron', sans-serif;
            font-weight: 900; 
            font-size: 2.2rem; 
            margin-bottom: 40px; 
            color: var(--a);
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 2px 0 var(--p), -2px 0 var(--s);
        }

        input { 
            width: 100%; 
            padding: 16px; 
            margin-bottom: 20px; 
            border: none;
            border-bottom: 2px solid #222;
            background: rgba(255, 255, 255, 0.03); 
            color: var(--a); 
            font-family: 'Fira Code', monospace; 
            outline: none; 
            transition: all 0.4s ease;
        }

        input:focus { 
            border-bottom: 2px solid var(--a);
            background: rgba(99, 102, 241, 0.05);
        }

        button { 
            width: 100%; 
            padding: 18px; 
            border: 1px solid var(--p);
            background: transparent;
            color: white; 
            font-weight: 700; 
            font-family: 'Orbitron';
            transition: 0.4s; 
            text-transform: uppercase; 
            letter-spacing: 3px;
        }

        button:hover { 
            background: var(--p);
            box-shadow: 0 0 30px var(--p);
            transform: scale(1.02);
        }

        #res_1, #image_area, #voice_area, #gate_msg { display: none; }
        
        .dl_link { 
            display: block; 
            padding: 15px; 
            margin: 10px 0; 
            border: 1px solid var(--a); 
            color: var(--a); 
            text-decoration: none; 
            font-size: 0.8rem;
            transition: 0.3s;
        }
        .dl_link:hover { background: var(--a); color: black; }

        #secret_img { 
            max-width: 100%; 
            border: 1px solid var(--a); 
            margin-top: 10px;
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.3);
        }
    </style>
</head>
<body>

<canvas id="v_"></canvas>

<div id="gate_msg" class="box_">
    <h2 style="color: var(--err); text-shadow: none;">BLOCKED</h2>
    <p style="color: #888; font-size: 0.8rem;">UNAUTHORIZED HARDWARE DETECTED</p>
</div>

<div id="login_ui" class="box_">
    <h2>VEX_CODE</h2>
    <input type="text" id="u_id" placeholder="SYS_USER" autocomplete="off">
    <input type="password" id="a_key" placeholder="SEC_KEY">
    <button id="auth_btn">INITIALIZE</button>
    <p id="err_msg" style="color: var(--err); margin-top: 10px; font-size: 0.8rem;"></p>
</div>

<div id="res_1" class="box_">
    <h2>UNLOCKED</h2>
    <a href="https://www.dropbox.com/scl/fi/adzrpc80kqfumzfg65k2z/Xeno-v1.3.25b.zip?dl=1" class="dl_link">WIN_X64_CORE</a>
    <a href="YOUR_ANDROID_LINK" class="dl_link">ANDROID_MOBILE_DATA</a>
</div>

<div id="image_area" class="box_">
    <h2>DECRYPTED</h2>
    <img id="secret_img" src="https://raw.githubusercontent.com/VexCodeV2/VexCodeV2.github.io/f578ab2625e3212513aefec3fdffc702a9d514f7/sys-metadata/config_042.dat.jpg" alt="Data">
</div>

<div id="voice_area" class="box_">
    <h2>AUDIO_FEED</h2>
    <p style="color: var(--a);">● STREAMING_LIVE</p>
</div>

// Matrix Effect
const c = document.getElementById('v_');
const x = c.getContext('2d');
c.width = window.innerWidth; c.height = window.innerHeight;
const drops = Array(Math.floor(c.width / 16)).fill(1);
setInterval(() => {
    x.fillStyle = 'rgba(0, 0, 0, 0.1)'; x.fillRect(0, 0, c.width, c.height);
    x.fillStyle = '#6366f1';
    drops.forEach((y, i) => {
        x.fillText(String.fromCharCode(Math.random() * 128), i * 16, y * 16);
        if (y * 16 > c.height && Math.random() > 0.98) drops[i] = 0;
        drops[i]++;
    });
}, 35);
</script>
</body>
</html>
