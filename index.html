<!DOCTYPE html>

<head>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #03050a;
    font-family: 'Courier New', monospace;
    color: #4db8ff;
    overflow: hidden;
  }

  /* Matrix Canvas Background */
  #v_ { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.15; }

  /* Curved outer glow frame */
  .wrapper {
    padding: 2px;
    border-radius: 24px;
    background: linear-gradient(135deg, #1e90ff, #00c6ff, #1e90ff);
    box-shadow: 0 0 35px rgba(0, 150, 255, 0.25);
    z-index: 10;
  }

  /* Main Terminal Box */
  .terminal {
    width: 320px;
    padding: 30px;
    background: #0b1220;
    border-radius: 20px;
    box-shadow: inset 0 0 20px rgba(0, 140, 255, 0.2), 0 15px 30px rgba(0, 0, 0, 0.6);
    text-align: center;
  }

  h2 {
    margin: 0 0 20px 0;
    letter-spacing: 2px;
    font-size: 16px;
    text-transform: uppercase;
    color: #00c6ff;
    text-shadow: 0 0 8px rgba(0, 198, 255, 0.6);
  }

  label { font-size: 11px; opacity: 0.7; display: block; text-align: left; margin-left: 5px; }

  input {
    width: 100%;
    padding: 10px;
    margin: 6px 0 15px 0;
    background: #050a16;
    border: 1px solid #1e90ff;
    border-radius: 10px;
    color: #4db8ff;
    box-sizing: border-box;
    outline: none;
    transition: 0.3s;
  }

  input:focus { border-color: #00c6ff; box-shadow: 0 0 8px rgba(0, 198, 255, 0.6); }

  button, .dl_link {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(90deg, #1e90ff, #00c6ff);
    font-weight: bold;
    letter-spacing: 1px;
    cursor: pointer;
    color: #001428;
    transition: 0.3s;
    text-transform: uppercase;
    display: inline-block;
    text-decoration: none;
    box-sizing: border-box;
    margin-top: 10px;
    text-align: center;
  }

  button:hover { box-shadow: 0 0 12px rgba(0, 198, 255, 0.8); transform: translateY(-1px); }

  #res_1, #image_area, #voice_area, #gate_msg { display: none; }
  
  #secret_img { 
    max-width: 100%; 
    border-radius: 10px; 
    border: 1px solid #1e90ff; 
    margin-top: 15px; 
    box-shadow: 0 0 15px rgba(0, 198, 255, 0.4);
  }

  .footer { margin-top: 15px; font-size: 10px; opacity: 0.5; }
  #err_msg { color: #ff4d4d; font-size: 10px; margin-bottom: 10px; height: 12px; }
</style>
</head>
<body>

// Matrix Background Effect
const c = document.getElementById('v_');
const x = c.getContext('2d');
c.width = window.innerWidth; c.height = window.innerHeight;
const drops = Array(Math.floor(c.width / 16)).fill(1);
setInterval(() => {
    x.fillStyle = 'rgba(0,0,0,0.1)'; x.fillRect(0,0,c.width,c.height);
    x.fillStyle = '#1e90ff';
    drops.forEach((y, i) => {
        x.fillText(String.fromCharCode(Math.random()*128), i*16, y*16);
        if (y*16 > c.height && Math.random() > 0.98) drops[i] = 0;
        drops[i]++;
    });
